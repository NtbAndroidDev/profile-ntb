<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binh | The Android Experience</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <link rel="stylesheet" href="styles.css">
    <!-- Load Three.js (removed since we use CSS 3D for perfect Apple Scroll, but keeping just in case) -->
</head>
<body>

    <!-- Smooth Scrolling Container Wrapper -->
    <div id="smooth-wrapper">
        
        <!-- Background Ambient -->
        <div class="bg-gradient"></div>

        <!-- FIXED 3D VIEWPORT -->
        <div class="fixed-viewport">
            
            <!-- Floating Text Elements -->
            <div class="text-layer" id="text-1">
                <h1>Meet Binh.</h1>
                <p class="subtitle">Mobile Software Engineer.</p>
                <div class="scroll-anim">
                    <span>Scroll to unfold</span>
                    <i class='bx bx-chevron-down'></i>
                </div>
            </div>

            <div class="text-layer" id="text-2">
                <h2>Master of Architecture.</h2>
                <p>Clean Code. MVVM. Built for Scale.</p>
            </div>

            <div class="text-layer" id="text-3">
                <h2 style="background: linear-gradient(90deg, #ff00ff, #00f0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AI Integrated.</h2>
                <p>Bridging mobile applications with Deep Learning & ViT5 models.</p>
            </div>

            <!-- The 3D CSS Smartphone -->
            <div class="phone-3d-wrapper" id="phone-wrapper">
                <div class="phone" id="the-phone">
                    
                    <!-- Back of Phone -->
                    <div class="phone-face phone-back">
                        <div class="camera-bump">
                            <div class="lens lens-1"></div>
                            <div class="lens lens-2"></div>
                            <div class="lens lens-3"></div>
                            <div class="flash"></div>
                        </div>
                        <div class="brand-logo"><i class='bx bxl-android'></i></div>
                    </div>

                    <!-- Front of Phone (Screen) -->
                    <div class="phone-face phone-front">
                        <div class="notch"></div>
                        
                        <!-- Screen Contents (Fading in/out with GSAP) -->
                        <div class="screen-content active" id="screen-1">
                            <div class="s1-time">09:41</div>
                            <div class="s1-date">Tuesday, March 31</div>
                            <div class="s1-widget">
                                <i class='bx bx-user-circle'></i> NtbAndroidDev
                            </div>
                        </div>
                        
                        <div class="screen-content" id="screen-2">
                            <i class='bx bx-layer code-icon' style="color: #f97316;"></i>
                            <h3>Kotlin / Dart</h3>
                            <div class="line-code"></div>
                            <div class="line-code w-70"></div>
                            <div class="line-code w-40"></div>
                        </div>

                        <div class="screen-content" id="screen-3">
                            <i class='bx bx-brain code-icon' style="color: #c026d3;"></i>
                            <h3>Machine Learning</h3>
                            <div class="ai-pulse"></div>
                        </div>

                        <div class="screen-content" id="screen-4">
                            <div class="gallery-header">
                                <h2>The Gallery.</h2>
                            </div>
                            <div id="projects-list-scrollable">
                                <!-- Populated dynamically by JS -->
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Scroll Height Spacers (To create length for GSAP scrubbing) -->
        <div class="scroll-spacer section-1"></div>
        <div class="scroll-spacer section-2"></div>
        <div class="scroll-spacer section-3"></div>
        <div class="scroll-spacer section-4"></div>
        
    </div>

    <!-- GSAP Core & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
